="spacing" textLength="183" x="11" y="103.6777">grant_type: client credentials</text><text fill="#FFFFFF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="37" x="11" y="118.9883">scope</text><polygon fill="#5AC7C3" points="229,153.041,219,157.041,229,161.041,225,157.041" style="stroke:#5AC7C3;stroke-width:1.0;"/><line style="stroke:#5AC7C3;stroke-width:1.0;" x1="223" x2="402" y1="157.041" y2="157.041"/><text fill="#FFFFFF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112" x="254.5" y="152.2988">返回 access token</text><polygon fill="#5AC7C3" points="625,182.3516,635,186.3516,625,190.3516,629,186.3516" style="stroke:#5AC7C3;stroke-width:1.0;"/><line style="stroke:#5AC7C3;stroke-width:1.0;" x1="218" x2="631" y1="186.3516" y2="186.3516"/><text fill="#FFFFFF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="198" x="328.5" y="181.6094">请求获取资源(携带 access token)</text><polygon fill="#5AC7C3" points="229,211.6621,219,215.6621,229,219.6621,225,215.6621" style="stroke:#5AC7C3;stroke-width:1.0;"/><line style="stroke:#5AC7C3;stroke-width:1.0;" x1="223" x2="636" y1="215.6621" y2="215.6621"/><text fill="#FFFFFF" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="52" x="401.5" y="210.9199">返回资源</text><!--MD5=[cececbb434e1699c17e0f45cf9e96c39]
@startuml
skinparamlocked roundcorner 10
skinparamlocked sequenceMessageAlign center
skinparamlocked arrowColor #5ac7c3
skinparamlocked arrowFontColor #white
skinparamlocked participantBackgroundColor #394248
skinparamlocked participantFontColor #57cc8a
skinparamlocked participantBorderColor #394248
skinparamlocked actorFontColor #white
skinparamlocked actorBorderColor #57cc8a
skinparamlocked actorBackgroundColor #transparent
skinparamlocked sequenceLifeLineBorderColor #afbac4
skinparamlocked noteBackgroundColor #f43655
skinparamlocked noteFontColor #white

!$client = "客户端(Client)"
!$authServer = "授权服务器(Authorization Server)"
!$resServer = "资源服务器(Resource Server)"

"$client" -> "$authServer": Client Authentication
note left
client_id
client_secret
grant_type: client credentials
scope
end note

"$authServer" -> "$client": 返回 access token

"$client" -> "$resServer" : 请求获取资源(携带 access token)
"$client" <- "$resServer" : 返回资源


@enduml

