"客户端(Client)" -> "授权服务器(Authorization Server)": 请求获取访问令牌(access token)
note left
code
client_id
client_secret
redirect_uri
grant_type: authorization code
end note

"客户端(Client)" <- "授权服务器(Authorization Server)": 返回访问令牌(access token)
"客户端(Client)" -> "资源服务器(Resource Server)" : 请求获取资源(携带 access token)
"客户端(Client)" <- "资源服务器(Resource Server)" : 返回资源


@enduml

